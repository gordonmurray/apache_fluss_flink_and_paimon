blob:
  server:
    port: '6124'
s3:
  path-style-access: true
  access-key: admin
  secret-key: password123
  endpoint: http://minio:9000
taskmanager:
  memory:
    process:
      size: 1728m
  numberOfTaskSlots: '4'
metrics:
  reporter:
    prom:
      port: 9249
      factory:
        class: org.apache.flink.metrics.prometheus.PrometheusReporterFactory
      host: 0.0.0.0
  reporters: prom
jobmanager:
  rpc:
    address: jobmanager
    port: 6123
  memory:
    process:
      size: 1600m
web:
  cancel:
    enable: true
  submit:
    enable: true
query:
  server:
    port: '6125'
parallelism:
  default: 1
